<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../style/cadastroStyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
  </head>
  <body class="body">

    <section class="welcome_text">
      <span class="desc">Olá, bem vindo!</span>
      <span class="sub_Desc text-success">Crie sua conta na cashFy</span>
    </section>

    <section>
      <form action="">
        <div class="input">
          <label for="usuario" class="label text-white-50">Nome:</label>
          <input type="text" name="usuario" id="usuario" class="inputForm px-3" placeholder="Digite seu nome">
        </div>

        <div class="input">
          <label for="email" class="label text-white-50">E-mail:</label>
          <input type="text" name="email" id="email" class="inputForm px-3" placeholder="Digite seu e-mail">
        </div>

        <div class="input">
          <label for="password" class="label text-white-50">Senha:</label>
          <input type="password" name="password" id="password" class="inputForm px-3" placeholder="Digite sua senha">
        </div>

        <div class="my-4">
          <input type="checkbox" name="remember" id="remember">
          <span class="text-white-50">Lembrar de mim</span>
        </div>

        <div class="my-4">
          <input type="submit" name="submit" id="submit" value="Entrar" class="submit bg-success text-light">
        </div>
      </form>

      <div class="socialMedia">
        <img src="../svg/google.svg" alt="googleIcon">
        <img src="../svg/facebook.svg" alt="facebookIcon">
      </div>
    </section>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
  </body>
</html>
